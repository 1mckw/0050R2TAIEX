<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TAIEX → 0050 / 0050反 即時換算</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>TAIEX / 台指期 → 0050 / 0050反</h1>
      <p class="sub">
        <span id="status">載入中…</span>
        <span class="dot">·</span>
        <span id="countdown">--</span>
      </p>
    </header>

    <section class="calc-panel">
      <div class="calc-header">
        <div>
          <h2>價格換算</h2>
          <p class="calc-hint">輸入 TAIEX 或台指期點位，即時推算 0050 與 0050反</p>
        </div>
        <label class="method-field">
          <span>方法</span>
          <select id="method">
            <option value="spread" selected>價差法 spread</option>
            <option value="ratio">倍率法 ratio</option>
            <option value="regression">迴歸法 regression</option>
          </select>
        </label>
      </div>

      <div class="mode-tabs" role="tablist">
        <button type="button" class="mode-tab active" data-mode="taiex" role="tab">TAIEX</button>
        <button type="button" class="mode-tab" data-mode="tx" role="tab">台指期</button>
      </div>

      <div class="calc-row">
        <label class="calc-field">
          <span id="input-label">TAIEX 點位</span>
          <input id="price-input" type="number" step="0.01" placeholder="例如 44500">
        </label>
        <label class="calc-field basis-field hidden" id="basis-wrap">
          <span>基差 <small>(台指期 − TAIEX)</small></span>
          <input id="basis" type="number" step="1" value="0" placeholder="0">
        </label>
        <div class="calc-field calc-action">
          <span class="invisible-label">操作</span>
          <button type="button" id="latest-btn" class="btn-latest">帶入最新 TAIEX</button>
        </div>
      </div>

      <p class="implied-taiex hidden" id="implied-taiex-line">
        <span id="tx-source-line">台指期 --</span>
        <span class="arrow">→</span>
        隱含 TAIEX：<strong id="implied-taiex">--</strong>
      </p>

      <div class="calc-results">
        <div class="calc-result">
          <span class="calc-result-label">推算 0050</span>
          <span class="calc-result-value" id="implied-etf50">--</span>
        </div>
        <div class="calc-result inv">
          <span class="calc-result-label">推算 0050反</span>
          <span class="calc-result-value" id="implied-etf-inv">--</span>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="refresh-btn" type="button">立即更新</button>
    </section>

    <p class="meta">TAIEX / ETF：Yahoo Finance｜台指期：TradingView <a href="https://www.tradingview.com/symbols/TAIFEX-TXF1!/" target="_blank" rel="noopener">TXF1!</a>。每 5 分鐘更新。僅供參考，非投資建議。</p>
  </div>
  <script src="app.js?v=7"></script>
</body>
</html>
